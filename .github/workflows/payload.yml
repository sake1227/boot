name: payload提取

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 下载直链'
        required: true
        default: ''
      rom_name:
        description: '保存名称'
        required: true
        default: ''

jobs:
  payload:
    runs-on: ubuntu-24.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip aria2 p7zip-full curl unzip
          curl https://rclone.org/install.sh | sudo bash

      - name: 配置 rclone S3 远程
        run: |
          mkdir -p ~/.config/rclone
          # 使用 rclone config 创建名为 s3 的远程存储
          rclone config create s3 s3 \
            provider Other \
            endpoint "${{ vars.S3_ENDPOINT }}" \
            access_key_id "${{ secrets.S3_ACCESS_KEY_ID }}" \
            secret_access_key "${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            region "${{ vars.S3_REGION }}" \
            force_path_style true
          # 可选：检查配置
          rclone config dump

      - name: 下载并提取固件
        run: |
          echo "输入名称：${{ github.event.inputs.rom_name }}"
          mkdir -p "${GITHUB_WORKSPACE}/workspace"
          cd "${GITHUB_WORKSPACE}/workspace"

          aria2c -s 12 -x 12 -d . -o firmware.zip "${{ github.event.inputs.rom_url }}"

          pip install --user git+https://github.com/sake1227/payload-dumper
          ~/.local/bin/payload_dumper --partitions boot,vbmeta,init_boot firmware.zip

      - name: 压缩并上传文件
        run: |
          cd "${GITHUB_WORKSPACE}/workspace/output"

          # 压缩提取出的分区文件
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             -p"${{ secrets.UNZIP_PASSWORD }}" *

          # 添加解压密码说明文件（请确保该文件存在，否则会报错）
          # 如果文件不存在，可以注释掉下面这行
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             /home/runner/work/boot/boot/获取解压密码.txt || true

          # 使用 rclone 上传到 S3 存储桶
          # 注意：S3_BUCKET_NAME 请在仓库变量中设置
          rclone sync "${{ github.event.inputs.rom_name }}.zip" \
            s3:${{ vars.S3_BUCKET_NAME }}/ \
            --progress --verbose

          # 可选：输出上传结果
          rclone ls s3:${{ vars.S3_BUCKET_NAME }}/
