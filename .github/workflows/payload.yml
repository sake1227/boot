name: payload提取

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 下载直链'
        required: true
        default: ''
      rom_name:
        description: '保存名称'
        required: true
        default: ''

jobs:
  payload:
    runs-on: ubuntu-24.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip aria2 p7zip-full curl unzip

      - name: 下载并提取固件
        run: |
          echo "输入名称：${{ github.event.inputs.rom_name }}"
          mkdir -p "${GITHUB_WORKSPACE}/workspace"
          cd "${GITHUB_WORKSPACE}/workspace"

          aria2c -s 12 -x 12 -d . -o firmware.zip "${{ github.event.inputs.rom_url }}"

          pip install --user git+https://github.com/sake1227/payload-dumper
          ~/.local/bin/payload_dumper --partitions boot,vbmeta,init_boot firmware.zip

      - name: 压缩文件
        run: |
          cd "${GITHUB_WORKSPACE}/workspace/output"
          # 先将提取出的所有文件打包（带密码）
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             -p"${{ secrets.UNZIP_PASSWORD }}" *
          # 再将密码说明文件添加到同一个 zip 中
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             /home/runner/work/boot/boot/获取解压密码.txt

      - name: 使用 curl 通过 POST 方法上传至 WebDAV
        env:
          WEBDAV_URL: ${{ secrets.WEBDAV_ADDRESS }}
          WEBDAV_USER: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASSWORD }}
          FILE_PATH: ${{ github.workspace }}/workspace/output/${{ github.event.inputs.rom_name }}.zip
          REMOTE_PATH: /zanfang/${{ github.event.inputs.rom_name }}.zip
        run: |
          # 尝试使用 POST 方法上传二进制数据
          # 注意：某些 WebDAV 服务器可能需要将文件放在表单字段 "file" 中，这里直接使用 --data-binary 发送原始内容
          curl -v -X POST \
               -u "$WEBDAV_USER:$WEBDAV_PASS" \
               -H "Content-Type: application/octet-stream" \
               --data-binary "@$FILE_PATH" \
               "$WEBDAV_URL$REMOTE_PATH" \
               -o /dev/null -w "\nHTTP 状态码: %{http_code}\n"

          # 检查上一个命令的退出码
          if [ $? -ne 0 ]; then
            echo "POST 上传失败，尝试使用 PUT 方法并添加 Expect 头..."
            curl -v -X PUT \
                 -u "$WEBDAV_USER:$WEBDAV_PASS" \
                 -H "Content-Type: application/octet-stream" \
                 -H "Expect:" \
                 -T "$FILE_PATH" \
                 "$WEBDAV_URL$REMOTE_PATH" \
                 -o /dev/null -w "\nHTTP 状态码: %{http_code}\n"
          fi
