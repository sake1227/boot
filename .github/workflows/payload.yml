name: payload提取

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 下载直链'
        required: true
        default: ''
      rom_name:
        description: '保存名称'
        required: true
        default: ''

jobs:
  payload:
    runs-on: ubuntu-24.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip aria2 p7zip-full curl unzip

      - name: 下载并提取固件
        run: |
          echo "输入名称：${{ github.event.inputs.rom_name }}"
          mkdir -p "${GITHUB_WORKSPACE}/workspace"
          cd "${GITHUB_WORKSPACE}/workspace"

          aria2c -s 12 -x 12 -d . -o firmware.zip "${{ github.event.inputs.rom_url }}"

          pip install --user git+https://github.com/sake1227/payload-dumper
          ~/.local/bin/payload_dumper --partitions boot,vbmeta,init_boot firmware.zip

      - name: 压缩文件
        run: |
          cd "${GITHUB_WORKSPACE}/workspace/output"
          # 先将提取出的所有文件打包（带密码）
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             -p"${{ secrets.UNZIP_PASSWORD }}" *
          # 再将密码说明文件添加到同一个 zip 中
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             /home/runner/work/boot/boot/获取解压密码.txt

      - name: 使用 rclone 上传至 WebDAV
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          # 安装 rclone
          curl https://rclone.org/install.sh | sudo bash

          # 创建配置目录并写入配置文件
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

          # 本地文件路径
          LOCAL_FILE="${GITHUB_WORKSPACE}/workspace/output/${{ github.event.inputs.rom_name }}.zip"

          # 执行上传（假设 rclone 配置中远程名称为 webdav-remote）
          rclone copy "$LOCAL_FILE" "123:zanfang" --verbose

          echo "✅ 文件已通过 rclone 成功上传到 WebDAV"
