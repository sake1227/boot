name: payload提取

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'ROM 下载直链'
        required: true
        default: ''
      rom_name:
        description: '保存名称'
        required: true
        default: ''

jobs:
  payload:
    runs-on: ubuntu-24.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip aria2 p7zip-full curl unzip
          pip install boto3

      - name: 下载并提取固件
        run: |
          echo "输入名称：${{ github.event.inputs.rom_name }}"
          mkdir -p "${GITHUB_WORKSPACE}/workspace"
          cd "${GITHUB_WORKSPACE}/workspace"

          aria2c -s 12 -x 12 -d . -o firmware.zip "${{ github.event.inputs.rom_url }}"

          pip install --user git+https://github.com/sake1227/payload-dumper
          ~/.local/bin/payload_dumper --partitions boot,vbmeta,init_boot firmware.zip

      - name: 压缩文件
        run: |
          cd "${GITHUB_WORKSPACE}/workspace/output"
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             -p"${{ secrets.UNZIP_PASSWORD }}" *
          # 添加解压密码说明文件（如果存在）
          7z a "${{ github.event.inputs.rom_name }}.zip" \
             /home/runner/work/boot/boot/获取解压密码.txt || true

      - name: 上传至 S3
        env:
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.S3_REGION }}
        run: |
          python - <<EOF
          import boto3
          from botocore.exceptions import ClientError
          import os
          import sys

          endpoint = os.environ['S3_ENDPOINT']
          bucket = os.environ['S3_BUCKET']
          access_key = os.environ['AWS_ACCESS_KEY_ID']
          secret_key = os.environ['AWS_SECRET_ACCESS_KEY']
          region = os.environ.get('AWS_DEFAULT_REGION', 'us-east-1')

          s3 = boto3.client(
              's3',
              endpoint_url=endpoint,
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              region_name=region
          )

          zip_file = f"${{ github.workspace }}/workspace/output/${{ github.event.inputs.rom_name }}.zip"
          # 如需上传到子目录，修改 object_key 为 "zanfang/${{ github.event.inputs.rom_name }}.zip"
          object_key = f"${{ github.event.inputs.rom_name }}.zip"

          if not os.path.exists(zip_file):
              print(f"❌ 文件不存在: {zip_file}")
              sys.exit(1)

          print(f"正在上传 {zip_file} 到 {bucket}/{object_key} ...")
          try:
              with open(zip_file, 'rb') as f:
                  s3.put_object(Bucket=bucket, Key=object_key, Body=f, ACL='private')
              print(f"✅ 上传成功: {bucket}/{object_key}")
          except ClientError as e:
              print(f"❌ 上传失败: {e}")
              sys.exit(1)
          EOF
